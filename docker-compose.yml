# Azure Resource Guardian — Docker Compose
# =========================================
# Brings up the full stack: Postgres, Redis, FastAPI backend, Celery
# worker + beat scheduler, and the React frontend behind nginx.
#
# Quick start:
#   cp .env.example .env   # fill in ENCRYPTION_KEY, SECRET_KEY, POSTGRES_PASSWORD, etc.
#   docker compose up -d --build
#   open http://localhost:3000
#
# First-run admin user: see scripts/seed_admin.py — run via
#   docker compose exec backend python -m scripts.seed_admin

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-arg}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arg-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arg-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-arg}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arg}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - arg-network

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-arg}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arg}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - arg-network
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    command: celery -A workers.scan_worker beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-arg}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arg}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arg-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - arg-network

volumes:
  postgres_data:
  redis_data:

networks:
  arg-network:
    driver: bridge
