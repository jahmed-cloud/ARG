# Nginx config for the ARG frontend container.
#
# Two responsibilities:
#   1. Serve the Vite-built SPA with client-side routing fallback
#      (any unmatched path serves index.html so React Router can handle it).
#   2. Proxy /api/* to the backend service so the browser only ever talks
#      to one origin — avoids CORS configuration entirely in production.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets — JS/CSS bundles compress well (~70% reduction)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Cache hashed assets aggressively; index.html must always revalidate
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy API calls to the backend service (Docker Compose service name).
    # Backend mounts all routers under /api/v1 (see backend/core/config.py
    # API_PREFIX) — passthrough with no rewrite keeps this nginx config in
    # sync with the backend without needing duplicate prefix logic.
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeout for report generation endpoints which can take a while
        proxy_read_timeout 120s;
    }

    # SPA fallback — let React Router own all non-file, non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
